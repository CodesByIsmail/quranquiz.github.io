<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v4.2.0/css/line.css"
    />

    <script defer src="script.js">
      script.js
    </script>
  </head>

  <body>
   
    <sectiion class="start__page container">
      <div class="start__page__container">
 <p class="error__text"></p>
        <div class="start__tittle">
          <span class="start__pg__icon"><i class="uil uil-book-open"></i></span>
          <h1>Quran Quiz</h1>
          <p>Test your knowledge of the Quran</p>
        </div>

        <form
          class="selectForm"
          action="Pick-Surah"
          method="get"
          accept-charset="utf-8"
        >
          <select name="Surahs" id="surahs__options">
            <!--         <option value="Fatiha">Fatiha</option> -->
          </select>

          <select name="NumberOfQuestions" id="NumberOfQuestions">
            <option value="5">5 Questions</option>
            <option value="10">10 Questions</option>
            <option value="15">15 Questions</option>
            <option value="20">20 Questions</option>
          </select>
          <button class="btn start__quiz" type="submit">Start Quiz</button>
        </form>
      </div>
    </sectiion>

    
    <section class="container quiz__page hidden">
        <div class="quiz__top">
  
                      <p>
            <span class="num__answerd">1</span> of
            <span class="total__ques">5</span>
            questions
<div class="progress">

          </p>
          <div class="progress__container">
            <div class="progress__bar" style="width: 50%;"></div>
          </div>
</div>


          <p>Score: <span class="score">4</span></p>
        </div>

        <div class="quiz__body">
          <div class="ques__body">
            <h4>What is the next verse?</h4>
            <span class="ques__ayah"></span>
          </div>

          <div class="options">
            
          </div>

          <div class="navigator">
            
            <button type="" class="prev__ques__btn btn invisible"><i class="uil uil-arrow-left"></i>Previous</button>
            
            <button type="" class="submit__btn btn invisible">Submit</button>
            
            <div class="submit__enquiry hidden">
              <p>Are you sure you want to submit?</p>
              <div class="yesOrNo">
                 <input type="submit" value="No" />
 <input type="submit" value="Yes" />
              </div>
            </div>
            
            <button class="next__ques__btn btn" type="">Next <i class="uil uil-arrow-right"></i></button>
          </div>
          
        </div>
    </section>
    
    
    
    <section class="container result__page hidden">
      <div class="result__page__container">
        weldone
      </div>
    </section>
  </body>
</html>
